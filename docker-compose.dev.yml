version: "3.9"

# 개발 환경 전용: DB + Redis만 실행
# 사용법: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: tw-dev-postgres
    environment:
      POSTGRES_DB: terraworld
      POSTGRES_USER: terraworld
      POSTGRES_PASSWORD: terraworld
      # dev 환경 — host 접속 시 password 검증 skip (LLM e2e 테스트 환경 안정성).
      # production 은 docker-compose.yml 의 별 설정 사용.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tw-dev-redis
    ports:
      - "6380:6379"

volumes:
  dev_postgres_data:
