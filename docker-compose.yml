version: "3.9"

services:
  # ──────────── Infrastructure ────────────
  postgres:
    image: postgres:16-alpine
    container_name: tw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: terraworld
      POSTGRES_USER: terraworld
      POSTGRES_PASSWORD: ${DB_PASSWORD:-terraworld}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terraworld"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────── Application ────────────
  backend:
    image: ${REGISTRY_URL:-terraworld}-backend:${TAG:-latest}
    container_name: tw-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/terraworld
      SPRING_DATASOURCE_USERNAME: terraworld
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-terraworld}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8080:8080"

  frontend:
    image: ${REGISTRY_URL:-terraworld}-frontend:${TAG:-latest}
    container_name: tw-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${API_BASE_URL:-http://backend:8080/api/v1}
    ports:
      - "3000:3000"

  # ──────────── Reverse Proxy ────────────
  nginx:
    image: nginx:alpine
    container_name: tw-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot_data:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────── Backup ────────────
  db-backup:
    image: postgres:16-alpine
    container_name: tw-db-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: terraworld
      PGPASSWORD: ${DB_PASSWORD:-terraworld}
      PGDATABASE: terraworld
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -Fc > /backups/terraworld_$$(date +%Y%m%d_%H%M%S).dump;
        find /backups -name '*.dump' -mtime +7 -delete;
        sleep 86400;
      done"

volumes:
  postgres_data:
  redis_data:
  certbot_data:
