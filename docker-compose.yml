# TerraWorld 프로덕션 스택.
# 인프라 종속값은 전부 deploy/.env 로 외부화 (.env.production.example 참고).
# 기동: deploy/scripts/bootstrap.sh (권장) 또는 아래 순서 수동 실행.
#   1) .env 작성  2) certbot 최초 발급  3) docker compose up -d
# ─────────────────────────────────────────────────────────────────────────
services:
  # ──────────── Infrastructure ────────────
  postgres:
    image: postgres:16-alpine
    container_name: tw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 포트 미노출 — nginx/backend/frontend 만 내부 네트워크로 접근 (보안).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tw-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────── Application ────────────
  # env_file 로 전체 env 계약 주입 (CI-3 fix): SPRING_DATASOURCE_URL / AUTH_JWKS_URL /
  # AUTH_JWT_ISSUER / AUTH_JWT_AUDIENCE / INTERNAL_API_TOKEN / CORS_ALLOWED_ORIGINS /
  # SPRING_PROFILES_ACTIVE / REDIS_HOST 등. 값은 .env 참조.
  backend:
    image: ${REGISTRY_URL}/terraworld-backend:${TAG:-latest}
    container_name: tw-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    image: ${REGISTRY_URL}/terraworld-frontend:${TAG:-latest}
    container_name: tw-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file: .env

  # ──────────── Reverse Proxy ────────────
  nginx:
    image: nginx:alpine
    container_name: tw-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    # nginx-alpine entrypoint 가 templates/*.template 를 envsubst → conf.d/.
    # NGINX_ENVSUBST_FILTER 로 지정한 변수만 치환($host 등 런타임 변수 보존).
    environment:
      DEPLOY_DOMAIN: "${DEPLOY_DOMAIN:?set DEPLOY_DOMAIN in .env}"
      IOS_TEAM_ID: ${IOS_TEAM_ID:-}
      ANDROID_SHA256_FINGERPRINT: ${ANDROID_SHA256_FINGERPRINT:-}
      NGINX_ENVSUBST_FILTER: "DEPLOY_DOMAIN|IOS_TEAM_ID|ANDROID_SHA256_FINGERPRINT"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────── TLS (Let's Encrypt) ────────────
  # 자동 기동 안 함(profiles). 최초 발급/갱신은 run --rm 로 호출 (bootstrap.sh 참조):
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d "$DEPLOY_DOMAIN" ...
  #   docker compose run --rm certbot renew   # host cron 권장, --deploy-hook 로 nginx reload
  certbot:
    image: certbot/certbot
    container_name: tw-certbot
    profiles: ["tools"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

  # 백업은 docker compose 서비스가 아니라 host cron 으로 관리한다.
  # scripts/pg-backup.sh + scripts/crontab.terraworld-backup 참고 (S3/GPG/Discord 알림 포함,
  # docs/dr-runbook.md 가 인용하는 실제 백업 메커니즘).

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_webroot:
