upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8080;
}

# ─────────────────────────────────────────────────────────────────────────
# HTTP (80) — Let's Encrypt 챌린지 + HTTPS 리다이렉트
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name terraworld.app www.terraworld.app;

    # Let's Encrypt 챌린지 (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Apple App Site Association (Universal Links)
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        return 200 '{"applinks":{"details":[{"appIDs":["TEAMID.app.terraworld.mobile"],"paths":["/share/*"]}]}}';
    }

    # Android App Links
    location = /.well-known/assetlinks.json {
        default_type application/json;
        return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"app.terraworld.mobile","sha256_cert_fingerprints":["SHA256_FINGERPRINT_HERE"]}}]';
    }

    # 그 외 모든 요청은 HTTPS 로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────
# HTTPS (443) — TLS 1.2+ only, HSTS, 모던 cipher suite
# ─────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name terraworld.app www.terraworld.app;

    # Let's Encrypt 인증서
    # 발급: docker-compose run --rm certbot certonly --webroot -w /var/www/certbot -d terraworld.app -d www.terraworld.app
    #
    # 갱신 (90일 전부터 가능, cron 권장):
    #   0 3 * * * /usr/bin/docker compose -f /opt/terraworld/docker-compose.yml run --rm certbot renew \
    #       --deploy-hook "docker compose -f /opt/terraworld/docker-compose.yml exec nginx nginx -s reload"
    # → certbot renew 가 인증서 갱신 후 deploy-hook 으로 nginx -s reload 자동 실행.
    # → reload 시 fullchain.pem / privkey.pem 새 파일을 다시 메모리로 로드 (downtime 없음).
    ssl_certificate     /etc/letsencrypt/live/terraworld.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terraworld.app/privkey.pem;

    # TLS 1.2+ only — 1.0/1.1 은 PCI / OWASP 권고로 비활성
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # 세션 캐시
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # 보안 헤더 (HSTS 포함). Nuxt/Spring 도 자체적으로 헤더를 보내지만 nginx 가 first hit.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API 프록시
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # 정적 자산 — 7일 캐시 (Nuxt 가 콘텐츠 해시 부여)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend (Nuxt SSR + WebSocket HMR — prod 에서는 HMR 미사용이지만 유지)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
